default:
  studyName: "strategus_template"
  webApiUrl: "https://atlas-demo.ohdsi.org/WebAPI"
  projectRootFolder: !expr getwd() # Project root folder will hold the study settings
  andromeda: !expr options(andromedaTempFolder = file.path(getwd(), "andromedaTemp"))
  studySpecificationFileName: "analysisSpecifications.json"
  evidenceSynthesisSpecificationFileName: "esAnalysisSpecification.json"
  resultsDatabaseSchema: "strategus_template"
  resultsConnectionDetails: !expr |
    DatabaseConnector::createConnectionDetails(
     dbms = "postgresql",
     server = Sys.getenv("OHDSI_RESULTS_DATABASE_SERVER"),
     user = Sys.getenv("OHDSI_RESULTS_DATABASE_USER"),
     password = Sys.getenv("OHDSI_RESULTS_DATABASE_PASSWORD")
    )
  # The following settings are for the secure OHDSI SFTP server and are
  # provided to each network study coordinator
  sftpDownloadFolder: !expr getwd()
  sftpRemoteFolderName: "covid19"
  sftpKeyFileName: "[location where you are storing: e.g. ~/keys/study-coordinator-covid19.dat]"
  sftpUserName: "[user name provided by the study coordinator: eg: study-coordinator-covid19]"
  # Shiny results viewer settings
  shinyReadOnlyUserName: "shinyproxy"
